services:
  dev:
    build:
      context: .
      args:
        NGINX_VERSION: ${NGINX_VERSION:-1.25.5}
    image: ngx-cache-purge-dev:${NGINX_VERSION:-1.25.5}
    working_dir: /workspace
    volumes:
      - .:/workspace
    tty: true
    stdin_open: true
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--save", "", "--appendonly", "no"]
