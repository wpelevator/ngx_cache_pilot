worker_processes  1;
daemon on;
master_process off;
error_log /dev/stderr notice;
pid /tmp/ngx-cache-pilot-validation.pid;

events {
    worker_connections 128;
}

http {
    access_log off;
    default_type text/plain;

    proxy_cache_path /tmp/ngx_cache_pilot_demo_soft keys_zone=demo_soft:10m;
    proxy_cache_path /tmp/ngx_cache_pilot_demo_stale keys_zone=demo_stale:10m;
    proxy_cache_path /tmp/ngx_cache_pilot_demo_wild keys_zone=demo_wild:10m;
    proxy_cache_path /tmp/ngx_cache_pilot_demo_all keys_zone=demo_all:10m;
    proxy_cache_path /tmp/ngx_cache_pilot_demo_sep keys_zone=demo_sep:10m;
    proxy_cache_path /tmp/ngx_cache_pilot_demo_tag keys_zone=demo_tag:10m;
    proxy_cache_path /tmp/ngx_cache_pilot_demo_tag_custom keys_zone=demo_tag_custom:10m;
    proxy_temp_path  /tmp/ngx_cache_pilot_temp 1 2;

    map $request_method $purge_request {
        default off;
        PURGE   on;
    }

    cache_pilot_index_store  sqlite /tmp/ngx_cache_pilot_demo_tags.sqlite;
    # For Redis-backed validation in docker compose, replace the line above with:
    # cache_pilot_index_store  redis redis:6379 db=10;

    server {
        listen 8080;
        server_name localhost;

        location = /origin/time {
            return 200 "$msec\n";
        }

        location = /origin/stale {
            if ($http_x_origin_fail = 1) {
                return 500 "origin failure\n";
            }

            return 200 "$msec\n";
        }

        location = /origin/tagged/a {
            add_header Surrogate-Key "group-one common";
            add_header Cache-Tag "alpha, shared";
            return 200 "tagged-a\n";
        }

        location = /origin/tagged/b {
            add_header Surrogate-Key "group-one";
            add_header Cache-Tag "beta, shared";
            return 200 "tagged-b\n";
        }

        location = /origin/tagged/c {
            add_header Surrogate-Key "group-three";
            add_header Cache-Tag "gamma";
            return 200 "tagged-c\n";
        }

        location = /origin/tagged/plain {
            add_header Surrogate-Key "group-plain";
            add_header Cache-Tag "plain-tag";
            return 200 "tagged-plain\n";
        }

        location = /origin/custom-tagged {
            add_header Edge-Tag "group-custom";
            add_header Custom-Group "custom-alpha, custom-shared";
            return 200 "custom-tagged\n";
        }

        location /soft {
            proxy_pass        $scheme://127.0.0.1:$server_port/origin/time;
            proxy_cache       demo_soft;
            proxy_cache_key   $uri$is_args$args;
            proxy_cache_valid 3m;
            add_header        X-Cache-Status $upstream_cache_status always;

            proxy_cache_purge $purge_request soft;
        }

        location /stale {
            proxy_pass                  $scheme://127.0.0.1:$server_port/origin/stale;
            proxy_cache                 demo_stale;
            proxy_cache_key             $uri$is_args$args;
            proxy_cache_valid           3m;
            proxy_cache_use_stale       http_500;
            add_header                  X-Cache-Status $upstream_cache_status always;

            proxy_cache_purge           $purge_request soft;
        }

        location /wild {
            proxy_pass        $scheme://127.0.0.1:$server_port/origin/time;
            proxy_cache       demo_wild;
            proxy_cache_key   $uri$is_args$args;
            proxy_cache_valid 3m;
            add_header        X-Cache-Status $upstream_cache_status always;

            proxy_cache_purge $purge_request soft;
        }

        location /purge_all {
            proxy_pass        $scheme://127.0.0.1:$server_port/origin/time;
            proxy_cache       demo_all;
            proxy_cache_key   $uri$is_args$args;
            proxy_cache_valid 3m;
            add_header        X-Cache-Status $upstream_cache_status always;

            proxy_cache_purge $purge_request soft purge_all;
        }

        location /separate {
            proxy_pass        $scheme://127.0.0.1:$server_port/origin/time;
            proxy_cache       demo_sep;
            proxy_cache_key   $uri$is_args$args;
            proxy_cache_valid 3m;
            add_header        X-Cache-Status $upstream_cache_status always;
        }

        location ~ /purge_separate(/.*) {
            proxy_cache       demo_sep;
            proxy_cache_key   $1$is_args$args;
            proxy_cache_purge $purge_request soft;
        }

        location /tagged {
            proxy_pass        $scheme://127.0.0.1:$server_port/origin$uri;
            proxy_cache       demo_tag;
            proxy_cache_key   $uri$is_args$args;
            proxy_cache_valid 3m;
            add_header        X-Cache-Status $upstream_cache_status always;

            proxy_cache_purge $purge_request soft;
            cache_pilot_purge_mode_header X-Purge-Mode;
            cache_pilot_index   on;
        }

        location = /tagged_custom {
            proxy_pass        $scheme://127.0.0.1:$server_port/origin/custom-tagged;
            proxy_cache       demo_tag_custom;
            proxy_cache_key   $uri$is_args$args;
            proxy_cache_valid 3m;
            add_header        X-Cache-Status $upstream_cache_status always;

            proxy_cache_purge $purge_request soft;
            cache_pilot_purge_mode_header X-Purge-Mode;
            cache_pilot_index   on;
            cache_pilot_tag_headers Edge-Tag Custom-Group;
        }

        location = /_stats {
            cache_pilot_stats;
        }
    }
}
