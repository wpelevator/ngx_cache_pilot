worker_processes 1;
daemon on;
master_process on;
error_log /tmp/bench_nginx_error.log warn;
pid /tmp/bench_nginx.pid;

thread_pool default threads=4 max_queue=65536;

events {
    worker_connections 4096;
}

http {
    access_log off;
    default_type text/plain;
    keepalive_timeout 30s;

    client_body_temp_path /tmp/bench_client_body_temp;
    proxy_temp_path /tmp/bench_proxy_temp 1 2;

    proxy_cache_path /tmp/bench_cache_fanout keys_zone=bench_fanout:16m;

    map $request_method $purge_request {
        default 0;
        PURGE   1;
    }

    cache_pilot_index_store sqlite /tmp/bench_tags.db;

    server {
        listen 18080;
        server_name localhost;

        location ~ ^/origin/exact-vary/(\d+)$ {
            add_header Vary X-Variant always;
            return 200 "exact-vary-$http_x_variant-$1\n";
        }

        location ~ ^/exact-vary/(\d+)$ {
            proxy_pass        $scheme://127.0.0.1:$server_port/origin/exact-vary/$1;
            proxy_cache       bench_fanout;
            proxy_cache_key   $uri$is_args$args;
            proxy_cache_valid 5m;
            add_header        X-Cache-Status $upstream_cache_status always;

            proxy_cache_purge $purge_request soft;
            cache_pilot_index on;
        }

        location = /bench_stats {
            cache_pilot_stats;
        }
    }
}
