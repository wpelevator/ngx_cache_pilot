worker_processes auto;
daemon on;
master_process on;
error_log /tmp/bench_nginx_error.log warn;
pid /tmp/bench_nginx.pid;

thread_pool default threads=4 max_queue=65536;

events {
    worker_connections 4096;
}

http {
    access_log off;
    default_type text/plain;
    keepalive_timeout 30s;

    client_body_temp_path /tmp/bench_client_body_temp;
    proxy_temp_path /tmp/bench_proxy_temp 1 2;

    proxy_cache_path /tmp/bench_cache_exact      keys_zone=bench_exact:16m;
    proxy_cache_path /tmp/bench_cache_wild       keys_zone=bench_wild:16m;
    proxy_cache_path /tmp/bench_cache_tag_sqlite keys_zone=bench_tag_sqlite:16m;
    proxy_cache_path /tmp/bench_cache_tag_redis  keys_zone=bench_tag_redis:16m;

    map $request_method $purge_request {
        default off;
        PURGE   on;
    }

    cache_pilot_index_store sqlite /tmp/bench_tags.db;

    map $uri $bench_tag_group {
        ~0$     g0;
        ~1$     g1;
        ~2$     g2;
        ~3$     g3;
        ~4$     g4;
        ~5$     g5;
        ~6$     g6;
        ~7$     g7;
        ~8$     g8;
        ~9$     g9;
        default g0;
    }

    server {
        listen 18080;
        server_name localhost;

        location ~ ^/origin/exact/(\d+)$ {
            return 200 "exact-$1\n";
        }

        location ~ ^/origin/wild/(\d+)$ {
            return 200 "wild-$1\n";
        }

        location ~ ^/origin/tag/(\d+)$ {
            add_header Cache-Tag "bench-tag-$bench_tag_group bench-shared";
            return 200 "tag-$1\n";
        }

        location ~ ^/origin/rtag/(\d+)$ {
            add_header Cache-Tag "bench-rtag-$bench_tag_group bench-shared";
            return 200 "rtag-$1\n";
        }

        location ~ ^/exact/(\d+)$ {
            proxy_pass        $scheme://127.0.0.1:$server_port/origin/exact/$1;
            proxy_cache       bench_exact;
            proxy_cache_key   $uri$is_args$args;
            proxy_cache_valid 5m;
            add_header        X-Cache-Status $upstream_cache_status always;

            proxy_cache_purge $purge_request soft;
        }

        location ~ ^/wild/(\d+)$ {
            proxy_pass        $scheme://127.0.0.1:$server_port/origin/wild/$1;
            proxy_cache       bench_wild;
            proxy_cache_key   $uri$is_args$args;
            proxy_cache_valid 5m;
            add_header        X-Cache-Status $upstream_cache_status always;

            proxy_cache_purge $purge_request soft;
        }

        location ~ ^/wild/(\d+\*)$ {
            proxy_pass        $scheme://127.0.0.1:$server_port/origin/wild/$1;
            proxy_cache       bench_wild;
            proxy_cache_key   $uri$is_args$args;
            proxy_cache_valid 5m;
            add_header        X-Cache-Status $upstream_cache_status always;

            proxy_cache_purge $purge_request soft;
        }

        location ~ ^/tag/(\d+)$ {
            proxy_pass               $scheme://127.0.0.1:$server_port/origin/tag/$1;
            proxy_cache              bench_tag_sqlite;
            proxy_cache_key          $uri$is_args$args;
            proxy_cache_valid        5m;
            add_header               X-Cache-Status $upstream_cache_status always;

            proxy_cache_purge        $purge_request soft;
            cache_pilot_purge_mode_header  X-Purge-Mode;
            cache_pilot_index          on;
        }

        location ~ ^/rtag/(\d+)$ {
            proxy_pass               $scheme://127.0.0.1:$server_port/origin/rtag/$1;
            proxy_cache              bench_tag_redis;
            proxy_cache_key          $uri$is_args$args;
            proxy_cache_valid        5m;
            add_header               X-Cache-Status $upstream_cache_status always;

            proxy_cache_purge        $purge_request soft;
            cache_pilot_purge_mode_header  X-Purge-Mode;
            cache_pilot_index          on;
        }

        location = /bench_stats {
            cache_pilot_stats;
        }
    }
}