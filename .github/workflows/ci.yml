name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        nginx_version:
          - "1.25.5"

    env:
      NGINX_VERSION: ${{ matrix.nginx_version }}

    steps:
      - uses: actions/checkout@v4

      - name: Show Docker versions
        run: |
          docker --version
          docker compose version

      - name: Build bundled CI container
        run: docker compose build dev

      - name: Run test suite in bundled container
        run: docker compose run --rm -T dev make test
